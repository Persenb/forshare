<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的主页</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      max-width: 640px;
      width: 100%;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      color: #1a1a2e;
    }
    p.subtitle {
      color: #666;
      margin-bottom: 32px;
      font-size: 1rem;
    }
    .card-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      text-decoration: none;
      color: #333;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }
    .card .title {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .card .desc {
      font-size: 0.85rem;
      color: #888;
      margin-top: 2px;
    }
    .card .arrow {
      color: #bbb;
      font-size: 1.2rem;
    }
    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>我的页面</h1>
    <p class="subtitle">选择下面的页面查看</p>
    <div class="card-list">
      <a class="card" href="oral_exam/">
        <div>
          <div class="title">口语考试话题</div>
          <div class="desc">2024-2025 春季学期 · 共 24 个话题</div>
        </div>
        <span class="arrow">&rarr;</span>
      </a>
    </div>
    <footer>GitHub Pages</footer>
  </div>
</body>
</html>
